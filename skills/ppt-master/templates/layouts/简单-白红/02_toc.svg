<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 页面标题 -->
  <text x="60" y="80" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="36" font-weight="bold" fill="#1A1A1A">
    目录
  </text>
  
  <!-- 标题下方红色底线 -->
  <rect x="60" y="95" width="50" height="3" fill="#C8102E"/>
  
  <!-- 目录项 1 -->
  <text x="100" y="180" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#C8102E" fill-opacity="0.2">01</text>
  <text x="180" y="175" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">{{TOC_ITEM_1_TITLE}}</text>
  <text x="180" y="200" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666666">{{TOC_ITEM_1_DESC}}</text>
  
  <!-- 目录项 2 -->
  <text x="100" y="280" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#C8102E" fill-opacity="0.2">02</text>
  <text x="180" y="275" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">{{TOC_ITEM_2_TITLE}}</text>
  <text x="180" y="300" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666666">{{TOC_ITEM_2_DESC}}</text>
  
  <!-- 目录项 3 -->
  <text x="100" y="380" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#C8102E" fill-opacity="0.2">03</text>
  <text x="180" y="375" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">{{TOC_ITEM_3_TITLE}}</text>
  <text x="180" y="400" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666666">{{TOC_ITEM_3_DESC}}</text>
  
  <!-- 目录项 4 -->
  <text x="100" y="480" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="#C8102E" fill-opacity="0.2">04</text>
  <text x="180" y="475" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="bold" fill="#1A1A1A">{{TOC_ITEM_4_TITLE}}</text>
  <text x="180" y="500" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#666666">{{TOC_ITEM_4_DESC}}</text>
  
  <!-- 右侧装饰线 -->
  <rect x="1100" y="150" width="2" height="400" fill="#E0E0E0"/>
  
  <!-- 右侧红色装饰点 -->
  <circle cx="1101" cy="180" r="4" fill="#C8102E"/>
  <circle cx="1101" cy="280" r="4" fill="#C8102E"/>
  <circle cx="1101" cy="380" r="4" fill="#C8102E"/>
  <circle cx="1101" cy="480" r="4" fill="#C8102E"/>
</svg>