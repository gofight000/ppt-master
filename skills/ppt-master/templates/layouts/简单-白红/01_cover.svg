<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 左侧红色装饰条 -->
  <rect x="60" y="200" width="6" height="200" fill="#C8102E"/>
  
  <!-- 底部红色装饰线 -->
  <rect x="60" y="600" width="200" height="2" fill="#C8102E"/>
  
  <!-- 主标题 -->
  <text x="100" y="300" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="52" font-weight="bold" fill="#1A1A1A">
    {{TITLE}}
  </text>
  
  <!-- 副标题 -->
  <text x="100" y="360" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" fill="#666666">
    {{SUBTITLE}}
  </text>
  
  <!-- 日期 -->
  <text x="100" y="550" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#999999">
    {{DATE}}
  </text>
  
  <!-- 作者/组织 -->
  <text x="100" y="580" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#999999">
    {{AUTHOR}}
  </text>
  
  <!-- 右上角装饰元素 - 红色小方块 -->
  <rect x="1140" y="60" width="80" height="6" fill="#C8102E" fill-opacity="0.3"/>
  <rect x="1200" y="60" width="20" height="6" fill="#C8102E" fill-opacity="0.6"/>
</svg>