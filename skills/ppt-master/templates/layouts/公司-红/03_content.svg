<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Template: Content Page - 公司-红 Corporate Red Theme -->

    <defs>
        <!-- Top Accent Gradient -->
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- White Background -->
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF" />

    <!-- Top Gradient Decoration Line -->
    <rect x="0" y="0" width="1280" height="4" fill="url(#topGrad)" />

    <!-- Page Header Navigation -->
    <!-- Chapter Number Block - Corporate Red Rounded -->
    <rect x="60" y="30" width="50" height="50" fill="#C41E3A" rx="8"/>
    <text x="85" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">{{CHAPTER_NUM}}</text>

    <!-- Page Title -->
    <text x="130" y="65" font-family="Microsoft YaHei, PingFang SC, SimHei, sans-serif" font-size="28" font-weight="bold" fill="#1A1A1A">{{PAGE_TITLE}}</text>

    <!-- Top Right Organization Label -->
    <text x="1220" y="55" text-anchor="end" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#6C757D">{{ORG_SHORT}}</text>
    <rect x="1107" y="60" width="113" height="2" fill="#C41E3A" fill-opacity="0.3"/>

    <!-- Content Area - Flexible Layout -->
    <!-- Available Layout Patterns:
       - Single Column Text List
       - Two Column Comparison (5:5)
       - Two Column Image-Text (4:6)
       - Card Grid (2x2)
       - Image-Text Mixed Layout
       - Table
       - Timeline
       - Flow Chart
    -->
    <rect x="60" y="100" width="1160" height="560" fill="none" stroke="#E9ECEF" stroke-width="2" stroke-dasharray="8,8" />
    <text x="640" y="360" text-anchor="middle" fill="#ADB5BD" font-size="18" font-family="Microsoft YaHei, sans-serif">
        {{CONTENT_AREA}}
    </text>
    <text x="640" y="395" text-anchor="middle" fill="#ADB5BD" font-size="14" font-family="Microsoft YaHei, sans-serif">
        (由 Executor 根据实际内容自由布局)
    </text>

    <!-- Design Element Reference -->
    <!-- Card Container: <rect fill="#F8F9FA" rx="12"/> -->
    <!-- Highlight Card: <rect fill="#C41E3A" rx="8"/> -->
    <!-- Secondary Accent: <rect fill="#8B0000"/> -->
    <!-- Bullet Point: <circle r="5" fill="#C41E3A"/> -->
    <!-- Divider Line: <line stroke="#E9ECEF" stroke-width="1"/> -->
    <!-- Gold Accent: <rect fill="#D4AF37"/> -->

    <!-- Bottom Decoration Line -->
    <rect x="0" y="717" width="1280" height="3" fill="#8B0000" />

    <!-- Page Number -->
    <text x="640" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6C757D">{{PAGE_NUM}}</text>

    <!-- Bottom Organization Name -->
    <text x="1220" y="695" text-anchor="end" font-family="Microsoft YaHei, sans-serif" font-size="12" fill="#6C757D" fill-opacity="0.6">{{ORG_SHORT}}</text>

</svg>
