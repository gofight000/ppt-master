<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Template: Ending Page - 公司-红 Corporate Red Theme -->

    <defs>
        <!-- Dark Navy Background Gradient -->
        <linearGradient id="endingBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#16213E;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0F3460;stop-opacity:1" />
        </linearGradient>
        <!-- Gold Accent Gradient -->
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Dark Navy Background -->
    <rect x="0" y="0" width="1280" height="720" fill="url(#endingBgGrad)" />

    <!-- Decorative Elements - Geometric Circles (Low Opacity) -->
    <circle cx="100" cy="100" r="250" fill="#FFFFFF" fill-opacity="0.02" />
    <circle cx="1200" cy="600" r="350" fill="#FFFFFF" fill-opacity="0.02" />
    <circle cx="640" cy="360" r="400" fill="#FFFFFF" fill-opacity="0.015" />

    <!-- Top Gold Accent Line -->
    <rect x="0" y="0" width="1280" height="6" fill="url(#goldGrad)" />

    <!-- Grid Decoration Lines -->
    <line x1="0" y1="180" x2="1280" y2="180" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.03" />
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.03" />
    <line x1="0" y1="540" x2="1280" y2="540" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.03" />
    <line x1="320" y1="0" x2="320" y2="720" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.03" />
    <line x1="640" y1="0" x2="640" y2="720" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.03" />
    <line x1="960" y1="0" x2="960" y2="720" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.03" />

    <!-- Left Decorative Vertical Bar -->
    <rect x="100" y="220" width="6" height="280" fill="#D4AF37" fill-opacity="0.6" />

    <!-- Thank You Message (Chinese) -->
    <text x="640" y="300" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, SimHei, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF">
        {{THANK_YOU}}
    </text>

    <!-- Thank You Message (English) -->
    <text x="640" y="360" text-anchor="middle" font-family="Arial, Georgia, serif" font-size="26" fill="#FFFFFF" fill-opacity="0.6" letter-spacing="4">
        {{THANK_YOU_EN}}
    </text>

    <!-- Divider Line -->
    <line x1="490" y1="400" x2="790" y2="400" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.8" />

    <!-- Organization Info (Chinese) -->
    <text x="640" y="470" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="22" fill="#FFFFFF" fill-opacity="0.9">
        {{AUTHOR}}
    </text>

    <!-- Organization Info (English) -->
    <text x="640" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.5">
        {{AUTHOR_EN}}
    </text>

    <!-- Contact Info -->
    <text x="640" y="570" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.6">
        {{CONTACT_INFO}}
    </text>

    <!-- Bottom Info Area -->
    <rect x="0" y="680" width="1280" height="40" fill="#C41E3A" fill-opacity="0.8" />
    <text x="640" y="707" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.9">
        {{ENDING_SUBTITLE}}
    </text>

</svg>
