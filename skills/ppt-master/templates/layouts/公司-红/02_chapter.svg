<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    <!-- Template: Chapter Page - 公司-红 Corporate Red Theme -->

    <defs>
        <!-- Deep Red Gradient Background -->
        <linearGradient id="gradChapter" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#8B0000;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#5C0011;stop-opacity:1" />
        </linearGradient>
        <!-- Gold Accent Gradient -->
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1280" height="720" fill="url(#gradChapter)"/>

    <!-- Decorative Elements - Geometric Circles -->
    <circle cx="1150" cy="100" r="260" fill="#FFFFFF" fill-opacity="0.03"/>
    <circle cx="100" cy="620" r="280" fill="#FFFFFF" fill-opacity="0.03"/>
    <circle cx="640" cy="360" r="360" fill="#FFFFFF" fill-opacity="0.02"/>

    <!-- Top Gold Accent Line -->
    <rect x="0" y="0" width="1280" height="6" fill="url(#goldGrad)"/>

    <!-- Grid Decoration Lines -->
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.05"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.05"/>
    <line x1="426" y1="0" x2="426" y2="720" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.05"/>
    <line x1="854" y1="0" x2="854" y2="720" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.05"/>

    <!-- Left Decorative Vertical Bar -->
    <rect x="100" y="260" width="6" height="200" fill="#D4AF37" fill-opacity="0.8"/>

    <!-- Chapter Content -->
    <g transform="translate(640, 360)">
        <!-- Chapter Number - Large Semi-transparent Background -->
        <text x="0" y="-60" text-anchor="middle" font-family="Arial" font-size="160" font-weight="bold" fill="#FFFFFF" fill-opacity="0.06">
            0{{CHAPTER_NUM}}
        </text>

        <!-- Decorative Rectangle -->
        <rect x="-50" y="0" width="100" height="6" fill="#D4AF37"/>

        <!-- Chapter Title -->
        <text x="0" y="70" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, SimHei, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF">
            {{CHAPTER_TITLE}}
        </text>

        <!-- English Subtitle -->
        <text x="0" y="120" text-anchor="middle" font-family="Arial" font-size="22" fill="#FFFFFF" fill-opacity="0.6" letter-spacing="3">
            {{CHAPTER_SUBTITLE}}
        </text>
    </g>

    <!-- Bottom Decoration -->
    <rect x="0" y="680" width="1280" height="40" fill="#1A1A2E" fill-opacity="0.4"/>
    <text x="640" y="707" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#FFFFFF" fill-opacity="0.8">
        {{ORGANIZATION}}
    </text>

</svg>
